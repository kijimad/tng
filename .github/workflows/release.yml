name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create zip
        run: cd dist && zip -r ../tng.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: tng.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
